<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Monitor — AutoBrix</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app-container">
    <!-- Top Header Bar -->
    <header>
      <div class="logo-section">
        <div class="logo-icon">A</div>
        <h1 class="logo-text">AutoBrix</h1>
        <span style="font-size:0.75rem; font-weight:700; color:var(--text-muted); background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; font-family:var(--font-mono);">v1.0.0</span>
      </div>

      <div class="nav-controls">
        <div class="nav-buttons">
          <a href="index.html" class="nav-btn">Control Hub</a>
          <a href="receptionist.html" class="nav-btn">POS Cashier</a>
          <a href="kitchen-a.html" class="nav-btn">Kitchen A (Fast Food)</a>
          <a href="kitchen-b.html" class="nav-btn">Kitchen B (Mains)</a>
          <a href="operations.html" class="nav-btn active">Operations</a>
          <a href="owner.html" class="nav-btn">Owner Admin</a>
        </div>

        <div id="db-status-badge"></div>

        <button class="theme-btn" id="theme-toggle" title="Toggle Theme"></button>
        
        <button class="theme-btn" id="reset-toggle" title="Reset All Data" style="color:var(--color-critical); border-color:rgba(239,68,68,0.2);">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M16 3h5v5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 21H3v-5"></path></svg>
        </button>
      </div>
    </header>

    <main>
      <div id="single-ops" style="height:100%;">
        <div class="ops-grid">
          <!-- Left Panel: Status Feed & KPIs -->
          <div class="ops-sidebar">
            <div class="ops-summary-mini">
              <div class="ops-mini-stat glass-card">
                <span class="form-label-xs">Active Alerts</span>
                <span class="ops-mini-val" id="ops-alert-count" style="color:var(--color-critical);">0</span>
              </div>
              <div class="ops-mini-stat glass-card">
                <span class="form-label-xs">Total Active Orders</span>
                <span class="ops-mini-val" id="ops-active-count">0</span>
              </div>
              <div class="ops-mini-stat glass-card">
                <span class="form-label-xs">Staff Checked-In</span>
                <span class="ops-mini-val" id="ops-staff-count" style="color:var(--color-success);">0</span>
              </div>
            </div>
            
            <div class="glass-card" style="flex-grow:1; display:flex; flex-direction:column; overflow:hidden;">
              <h4 class="modal-section-title" style="margin-bottom:0.75rem;">Live Alerts Feed</h4>
              <div class="ops-live-alerts-list" id="ops-alerts-list"></div>
            </div>
          </div>
          
          <!-- Right Panel: Grid of Station Timelines & Active Orders -->
          <div class="ops-main-panel">
            <!-- Station Workload Vis -->
            <div class="glass-card">
              <h4 class="modal-section-title" style="margin-bottom:0.75rem;">Kitchen Station Occupancy</h4>
              <div class="station-ops-grid" id="ops-stations-grid"></div>
            </div>
            
            <!-- Live Active Orders List -->
            <div class="glass-card" style="flex-grow:1;">
              <h4 class="modal-section-title" style="margin-bottom:0.75rem;">Live Orders Monitor</h4>
              <div class="owner-table-wrapper" style="border:none;">
                <table class="owner-table">
                  <thead>
                    <tr>
                      <th>Order #</th>
                      <th>Customer</th>
                      <th>Source</th>
                      <th>ETA</th>
                      <th>Fulfillment</th>
                      <th>Payment</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="ops-orders-list"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/store.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/operations.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
