<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Screen B — AutoBrix</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app-container">
    <!-- Top Header Bar -->
    <header>
      <div class="logo-section">
        <div class="logo-icon">A</div>
        <h1 class="logo-text">AutoBrix</h1>
        <span style="font-size:0.75rem; font-weight:700; color:var(--text-muted); background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; font-family:var(--font-mono);">v1.0.0</span>
      </div>

      <div class="nav-controls">
        <div class="nav-buttons">
          <a href="index.html" class="nav-btn">Control Hub</a>
          <a href="receptionist.html" class="nav-btn">POS Cashier</a>
          <a href="kitchen-a.html" class="nav-btn">Kitchen A (Fast Food)</a>
          <a href="kitchen-b.html" class="nav-btn active">Kitchen B (Mains)</a>
          <a href="operations.html" class="nav-btn">Operations</a>
          <a href="owner.html" class="nav-btn">Owner Admin</a>
        </div>

        <div id="db-status-badge"></div>

        <button class="theme-btn" id="theme-toggle" title="Toggle Theme"></button>
        
        <button class="theme-btn" id="reset-toggle" title="Reset All Data" style="color:var(--color-critical); border-color:rgba(239,68,68,0.2);">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M16 3h5v5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 21H3v-5"></path></svg>
        </button>
      </div>
    </header>

    <main>
      <div id="single-kds-b" style="height:100%;">
        <div class="kitchen-view-wrapper">
          <div class="kitchen-header">
            <div style="display:flex; align-items:center; gap:0.75rem;">
              <span class="logo-icon" style="background:#ec4899">B</span>
              <h3 style="font-size:1.1rem; font-weight:700; font-family:var(--font-sans);">KITCHEN SCREEN B — MAINS / FRY / MUGHLAI</h3>
            </div>
            <div class="kitchen-stats">
              <span class="kitchen-stat-item">Active Orders: <strong id="k-active-count">0</strong></span>
              <span class="kitchen-stat-item">Avg Prep Time: <strong id="k-avg-wait">0m</strong></span>
            </div>
          </div>
          <div class="kitchen-orders-scroll" id="kitchen-orders-container"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/store.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/kitchen.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
